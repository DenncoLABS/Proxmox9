name: Publish noVNC Clipboard APT Repo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'extensions/novnc-clipboard-panel/**'
      - '.github/workflows/publish-novnc-clipboard-apt.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install package tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Build APT repository
        run: |
          cd extensions/novnc-clipboard-panel
          bash packaging/build-apt-repo.sh

      - name: Stage Pages site
        run: |
          mkdir -p _site/novnc-clipboard-panel
          cp -a extensions/novnc-clipboard-panel/packaging/apt-repo/. _site/novnc-clipboard-panel/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>Dennco Proxmox Packages</title></head>
          <body>
          <h1>Dennco Proxmox Packages</h1>
          <p><a href="novnc-clipboard-panel/">noVNC Clipboard Panel APT Repository</a></p>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
